{% extends "base.html" %}

{% block content %}
<section class="error-page section-space">
  <div class="shell-container">
    <div class="error-card reveal">
      <p class="eyebrow">404</p>
      <h1>The page you were looking for is not here.</h1>
      <p>
        It may have moved, been removed, or never existed. The archive is still intact, and the best route back is the journal homepage.
      </p>
      <a href="{% url 'index' %}" class="button button--primary">Return to the journal</a>
    </div>
  </div>
</section>
{% endblock %}
